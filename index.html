<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهامي - To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 مهامي</h1>
        
        <!-- إضافة مهمة جديدة -->
        <div class="add-todo">
            <input type="text" id="todoInput" placeholder="أكتب مهمة جديدة...">
            <button id="addBtn">➕ إضافة</button>
        </div>
        
        <!-- أزرار التصفية -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="completed">مكتملة</button>
            <button class="filter-btn" data-filter="pending">غير مكتملة</button>
        </div>
        
        <!-- قائمة المهام -->
        <ul id="todoList" class="todo-list">
            <!-- المهام رح تظهر هنا عبر JavaScript -->
        </ul>
        
        <!-- إحصائيات -->
        <div class="stats">
            <span>المهام المكتملة: <span id="completedCount">0</span></span>
            <span>إجمالي المهام: <span id="totalCount">0</span></span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
